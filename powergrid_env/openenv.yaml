spec_version: 1

name: powergrid_env
display_name: "Power Grid Microgrid Balancing"
version: "1.0.0"
description: >
  LLM training environment for real-world energy management.
  An agent manages battery storage and flexible load scheduling
  across a 24-hour residential microgrid to minimise electricity
  costs while maximising solar utilisation and grid stability.
  96 steps × 15-min intervals. Dense reward signal every step.

type: space
theme: world_modeling_professional

runtime: fastapi
app: server.app:app
port: 8000

author: "Meta Hackathon Team"
license: MIT

tags:
  - power-systems
  - energy-management
  - battery-control
  - long-horizon
  - real-world

action_space:
  type: continuous
  fields:
    battery_action:
      type: float
      range: [-1.0, 1.0]
      description: "Fraction of max battery power. Negative = discharge, positive = charge."
    curtailment:
      type: float
      range: [0.0, 1.0]
      description: "Fraction of flexible load to shed (0 = none)."

observation_space:
  fields:
    step: {type: int, range: [0, 95]}
    hour: {type: float, range: [0, 24]}
    solar_kw: {type: float, unit: kW}
    demand_kw: {type: float, unit: kW}
    flexible_demand_kw: {type: float, unit: kW}
    battery_soc: {type: float, range: [0, 1]}
    battery_power_kw: {type: float, unit: kW}
    electricity_price: {type: float, unit: "$/kWh"}
    grid_import_kw: {type: float, unit: kW}
    grid_export_kw: {type: float, unit: kW}
    episode_cost_usd: {type: float, unit: "$"}
    episode_curtailed_kwh: {type: float, unit: kWh}
    episode_solar_used_kwh: {type: float, unit: kWh}
    done: {type: bool}
    reward: {type: float}
    context: {type: str, description: "Human-readable summary for LLM agents"}

reward:
  range: [0.0, 1.0]
  description: >
    Dense per-step reward strictly in [0, 1]. Four normalised components combined
    as a weighted sum. Terminal step adds up to +0.05 solar bonus (capped at 1.0).
  components:
    r_cost:    "max(0, min(1, 1 - net_cost / max_step_cost)) — cost efficiency; weight 0.60"
    r_solar:   "max(0, min(1, (solar_kw - export_kw) / solar_kw)) — renewable capture; weight 0.20"
    r_service: "min(1, load_served / total_load) — curtailment avoidance; weight 0.10"
    r_stab:    "max(0, min(1, soc_margin / 0.10)) — battery health; weight 0.10"
  formula: "reward = 0.60*r_cost + 0.20*r_solar + 0.10*r_service + 0.10*r_stab"

episode:
  length: 96
  dt_hours: 0.25
  horizon_hours: 24

config:
  PROFILE_NOISE: {type: float, default: 0.05, description: "Gaussian noise on solar/load profiles"}
  SEED: {type: int, default: null, description: "Random seed for reproducibility"}

tasks:
  - task_id: cost_minimization
    difficulty: easy
    seed: 42
    description: >
      Minimize 24-hour electricity cost using battery charge/discharge arbitrage.
      Score = normalized cost reduction. 0.0 = random baseline ($60), 1.0 = optimal ($10).
    scoring:
      cost: 1.0
    endpoints:
      reset: POST /reset?task_id=cost_minimization
      grade: GET /grade/cost_minimization

  - task_id: solar_arbitrage
    difficulty: medium
    seed: 77
    description: >
      Maximize solar self-consumption AND minimize grid import on a high-solar summer day.
      Requires timing battery charging to capture midday surplus and discharge at evening peak.
    scoring:
      cost:  0.6
      solar: 0.4
    endpoints:
      reset: POST /reset?task_id=solar_arbitrage
      grade: GET /grade/solar_arbitrage

  - task_id: full_dispatch
    difficulty: hard
    seed: 13
    description: >
      Full multi-objective dispatch on a winter day with limited solar.
      Optimize cost, solar capture, avoid curtailment, and keep SoC in healthy range.
    scoring:
      cost:        0.40
      solar:       0.30
      curtailment: 0.15
      stability:   0.15
    endpoints:
      reset: POST /reset?task_id=full_dispatch
      grade: GET /grade/full_dispatch

grader:
  score_range: [0.0, 1.0]
  endpoint: GET /grade/{task_id}
  requires_done: true
